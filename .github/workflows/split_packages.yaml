name: Split Packages

on:
    push:
        branches:
            - main
        paths:
            - 'src/**'
        tags:
            - '*'
    workflow_dispatch: ~

jobs:
    ci:
        name: "Continuous Integration"
        uses: ./.github/workflows/ci.yaml
    split_monorepo:
        name: "Split packages"
        #needs: ci
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                package:
                    - { name: 'AdminUi' }
                    - { name: 'BootstrapAdminUi' }
                    - { name: 'TwigExtra' }
                    - { name: 'TwigHooks' }
                    - { name: 'UiTranslations' }
        steps:
            -   uses: actions/checkout@v3
                with:
                    fetch-depth: 0

            -   name: Split of ${{ matrix.package.name }}
                uses: symplify/monorepo-split-github-action@2.1
                env:
                    GITHUB_TOKEN: ${{ secrets.MONOPLUS_PAT }}
                with:
                    package_directory: 'src/${{ matrix.package.name }}'
                    repository_organization: 'Sylius'
                    repository_name: '${{ matrix.package.name }}'
                    user_name: 'GSadee'
                    user_email: 'sadowskigp@gmail.com'
